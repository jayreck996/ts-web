name: could-update-eml

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Which env to send for (prod | test | all)'
        type: choice
        options: [prod, test, all]
        default: prod
      target:
        description: 'Single target override (e.g. hawkinsnz). Leave empty to use env filter.'
        type: string
        required: false
  workflow_call:
    inputs:
      env:
        type: string
        required: false
        default: prod
      target:
        type: string
        required: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Load targets
        id: load
        env:
          ENV_FILTER: ${{ inputs.env || 'prod' }}
          TARGET_OVERRIDE: ${{ inputs.target }}
        run: |
          if [ -n "$TARGET_OVERRIDE" ]; then
            matrix=$(jq -c --arg t "$TARGET_OVERRIDE" '[.[] | select(.target == $t)] | map({target,outputRepo,tokenSecret})' targets.json)
          elif [ "$ENV_FILTER" = "all" ]; then
            matrix=$(jq -c '[.[] | {target,outputRepo,tokenSecret}]' targets.json)
          else
            matrix=$(jq -c --arg e "$ENV_FILTER" '[.[] | select(.env == $e)] | map({target,outputRepo,tokenSecret})' targets.json)
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Targets: $matrix"

  email:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ matrix.outputRepo }}
          token: ${{ secrets[matrix.tokenSecret] }}

      - name: Compute quarter and date
        id: q
        run: |
          YEAR=$(TZ=Pacific/Auckland date +%Y)
          MONTH=$(TZ=Pacific/Auckland date +%-m)
          echo "quarter=${YEAR}Q$(( (MONTH - 1) / 3 + 1 ))" >> $GITHUB_OUTPUT
          echo "today=$(TZ=Pacific/Auckland date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Wait for entries to land (listener write is async)
        env:
          QUARTER: ${{ steps.q.outputs.quarter }}
          TODAY: ${{ steps.q.outputs.today }}
        run: |
          for i in $(seq 1 30); do
            FOUND=false
            for f in could/*-"${QUARTER}".md; do
              [ -f "$f" ] || continue
              if awk -v d="$TODAY" '/^## (ASSET|ISSUE):/{if (index($0, d) > 0) found=1} END{exit !found}' "$f"; then
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = "true" ]; then
              echo "Entries found after $(( (i - 1) * 20 ))s"
              exit 0
            fi
            sleep 20
            git pull --quiet
          done
          echo "Timed out waiting for dated entries — proceeding anyway (will send=false downstream if still none)"

      - name: Extract today's entries from could/
        id: extract
        env:
          QUARTER: ${{ steps.q.outputs.quarter }}
          TODAY: ${{ steps.q.outputs.today }}
        run: |
          BODY=/tmp/email-body.md
          : > $BODY
          for f in could/*-"${QUARTER}".md; do
            [ -f "$f" ] || continue
            # print each entry whose header line carries today's date, including its body lines
            awk -v d="$TODAY" '/^## (ASSET|ISSUE):/{p = (index($0, d) > 0)} p' "$f" >> $BODY
          done
          if [ -s $BODY ]; then
            echo "send=true" >> $GITHUB_OUTPUT
          else
            echo "send=false" >> $GITHUB_OUTPUT
            echo "No entries dated $TODAY — nothing to send."
          fi
          cat $BODY

      - name: Send email to client
        if: steps.extract.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-relay.brevo.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "ts-web could-update — ${{ matrix.target }} ${{ steps.q.outputs.today }}"
          to: admin@toigroup.co.nz,jayreck996@gmail.com
          from: ts-web <jayreck996@gmail.com>
          body: file:///tmp/email-body.md
          attachments: could/ANALYSIS-ASSET-${{ steps.q.outputs.quarter }}.md,could/ANALYSIS-ISSUE-${{ steps.q.outputs.quarter }}.md